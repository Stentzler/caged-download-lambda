name: Deploy Check Availability Lambda

on:
  push:
    branches:
      - develop
      - main

jobs:
  deploy:
    uses: Stentzler/lambda-cicd/.github/workflows/lambda-python-sam.yml@main
    with:
      lambda_name: check-availability
      python_version: "3.14"
      aws_region: us-east-1
      dev_branch: develop
      prod_branch: main
    secrets:
      aws_deploy_role_arn: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}